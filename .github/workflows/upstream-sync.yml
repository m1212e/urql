name: Upstream Sync

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/urql-community/urql.git
          git fetch upstream --tags

      - name: Check for new upstream release
        id: check
        run: |
          LAST_SYNCED=$(cat .github/upstream-sync-state 2>/dev/null || echo "")
          UPSTREAM_LATEST=$(git tag --list --sort=-version:refname | grep -E '^@urql/core@' | head -1 || echo "")

          if [ "$UPSTREAM_LATEST" = "$LAST_SYNCED" ] || [ -z "$UPSTREAM_LATEST" ]; then
            echo "No new upstream release (latest: $UPSTREAM_LATEST)"
            echo "has_new_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "New upstream release: $UPSTREAM_LATEST (was: $LAST_SYNCED)"
          echo "has_new_release=true" >> $GITHUB_OUTPUT
          echo "upstream_latest=$UPSTREAM_LATEST" >> $GITHUB_OUTPUT
          echo "last_synced=$LAST_SYNCED" >> $GITHUB_OUTPUT

      - name: Merge upstream changes
        if: steps.check.outputs.has_new_release == 'true'
        run: git merge upstream/main --no-edit

      - name: Transform and create changeset
        if: steps.check.outputs.has_new_release == 'true'
        run: |
          UPSTREAM_TAG="${{ steps.check.outputs.upstream_latest }}"
          LAST_TAG="${{ steps.check.outputs.last_synced }}"

          # Drop upstream changeset files entirely — they cover packages we don't publish
          find .changeset -name "*.md" -not -name "README.md" -not -name "full-plants-bathe.md" | xargs -r rm -f

          # Determine bump type from version difference
          NEW_VERSION=$(echo "$UPSTREAM_TAG" | sed 's/.*@//')
          OLD_VERSION=$(echo "$LAST_TAG" | sed 's/.*@//')
          NEW_MAJOR=$(echo "$NEW_VERSION" | cut -d. -f1)
          OLD_MAJOR=$(echo "$OLD_VERSION" | cut -d. -f1)
          NEW_MINOR=$(echo "$NEW_VERSION" | cut -d. -f2)
          OLD_MINOR=$(echo "$OLD_VERSION" | cut -d. -f2)

          if [ -z "$OLD_VERSION" ] || [ "$NEW_MAJOR" != "$OLD_MAJOR" ]; then
            BUMP_TYPE="major"
          elif [ "$NEW_MINOR" != "$OLD_MINOR" ]; then
            BUMP_TYPE="minor"
          else
            BUMP_TYPE="patch"
          fi

          SYNC_FILE=".changeset/upstream-sync-$(echo $UPSTREAM_TAG | tr '@/' '--').md"
          printf -- "---\n'@m1212e/urql-exchange-graphcache': %s\n---\n\nSync with upstream urql release %s\n" \
            "$BUMP_TYPE" "$UPSTREAM_TAG" > "$SYNC_FILE"

          echo "$UPSTREAM_TAG" > .github/upstream-sync-state

      - name: Push sync changes
        if: steps.check.outputs.has_new_release == 'true'
        run: |
          git add -A
          git commit -m "chore: sync with upstream ${{ steps.check.outputs.upstream_latest }}"
          git push origin main
